services:
  bot:
    build: .
    container_name: gh-watcher-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:./data/dev.db}
    volumes:
      - ./data:/app/data
    stop_grace_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: sync+restart
          path: ./drizzle.config.ts
          target: /app/drizzle.config.ts
        - action: sync+restart
          path: ./tsconfig.json
          target: /app/tsconfig.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./bun.lock
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./entrypoint.sh
